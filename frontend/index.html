<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Quality Spatial Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #eee;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 320px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            margin-top: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4db8ff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .legend {
            margin-top: 20px;
            font-size: 0.8rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .legend-line {
            width: 24px;
            height: 4px;
            border-radius: 2px;
            margin-right: 10px;
        }
        
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
        
        /* Custom Tooltip Styling */
        .custom-tooltip {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            max-width: 250px;
            white-space: normal;
        }
        .custom-tooltip .title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 6px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
        .custom-tooltip .metric {
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #aaa;
        }
        .custom-tooltip .reason {
            font-size: 0.8rem;
            margin-top: 8px;
            color: #ddd;
            line-height: 1.3;
        }
        .leaflet-tooltip-left::before, .leaflet-tooltip-right::before {
            border-left-color: rgba(15, 15, 15, 0.95);
            border-right-color: rgba(15, 15, 15, 0.95);
        }
        #loader {
            font-size: 0.8rem;
            color: #4db8ff;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>Water Monitor (UK)</h1>
        <div id="loader">Loading mapping data...</div>
        
        <div class="legend" style="margin-bottom: 20px;">
            <strong>Map Background</strong>
            <div style="margin-top: 8px;">
                <label style="display: flex; align-items: center; cursor: pointer; font-size: 0.9em; margin-bottom: 5px;">
                    <input type="radio" name="basemap" value="satellite" checked onchange="changeBasemap(this.value)" style="margin-right: 8px;">
                    Satellite (Ground Truth)
                </label>
                <label style="display: flex; align-items: center; cursor: pointer; font-size: 0.9em; margin-bottom: 5px;">
                    <input type="radio" name="basemap" value="ndwi" onchange="changeBasemap(this.value)" style="margin-right: 8px;">
                    Moisture Index (NDWI)
                </label>
                <label style="display: flex; align-items: center; cursor: pointer; font-size: 0.9em;">
                    <input type="radio" name="basemap" value="dark" onchange="changeBasemap(this.value)" style="margin-right: 8px;">
                    Standard Dark Map
                </label>
            </div>
        </div>

        <div class="legend" id="ndwi-legend" style="margin-bottom: 20px; display: none;">
            <strong>Moisture Index (NDWI)</strong>
            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                <div style="display: flex; align-items: center; font-size: 0.75rem;">
                    <div style="width: 12px; height: 12px; background: #000080; border-radius: 2px; margin-right: 8px;"></div>
                    <span>Clear / Deep Water (> 0.5)</span>
                </div>
                <div style="display: flex; align-items: center; font-size: 0.75rem;">
                    <div style="width: 12px; height: 12px; background: #0066cc; border-radius: 2px; margin-right: 8px;"></div>
                    <span>Shallow / Turbid (0.2 - 0.5)</span>
                </div>
                <div style="display: flex; align-items: center; font-size: 0.75rem;">
                    <div style="width: 12px; height: 12px; background: #33ccff; border-radius: 2px; margin-right: 8px;"></div>
                    <span>Moist Land / Flood (0.0 - 0.2)</span>
                </div>
            </div>
            
            <div style="margin-top: 15px;">
                <label style="font-size: 0.75rem; color: #aaa; display: block; margin-bottom: 5px;">Data Overlay Opacity:</label>
                <input type="range" min="0" max="100" value="60" style="width: 100%; cursor: pointer;" oninput="updateNdwiOpacity(this.value)">
            </div>

            <div id="ndwi-timestamp" style="font-size: 0.65rem; color: #4db8ff; margin-top: 12px; font-style: italic; border-top: 1px solid #333; padding-top: 8px;">
                Latest Scan: Loading...
            </div>
        </div>

        <div class="legend" style="margin-bottom: 20px;">
            <strong>Data Filters</strong>
            <div style="margin-top: 8px;">
                <label style="display: flex; align-items: center; cursor: pointer; font-size: 0.9em; color: #4db8ff;">
                    <input type="checkbox" id="sentinel-debug" onchange="updateHighResData()" style="margin-right: 8px;">
                    Sentinel Sanity Check (Hide segments without stats)
                </label>
            </div>
        </div>

        <div class="legend">
            <strong>Waterway Status Layer</strong>
            <div class="legend-item" style="margin-top:12px;">
                <div class="legend-line" style="background: #ef4444; box-shadow: 0 0 8px #ef4444;"></div>
                <span>Critical Risk (Runoff/Spill)</span>
            </div>
            <div class="legend-item">
                <div class="legend-line" style="background: #f59e0b; box-shadow: 0 0 8px #f59e0b;"></div>
                <span>Warning (Strain Detected)</span>
            </div>
            <div class="legend-item">
                <div class="legend-line" style="background: #3b82f6;"></div>
                <span>Normal / Healthy</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const map = L.map('map', {
            center: [52.8, -2.0], // UK Center
            zoom: 6.5,
            zoomControl: false,
            renderer: L.canvas()
        });

        // Basemaps
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        });

        const endDate = new Date();
        const startDate = new Date();
        startDate.setMonth(startDate.getMonth() - 6);
        const timeString = `${startDate.toISOString().split('T')[0]}/${endDate.toISOString().split('T')[0]}`;

        const copernicusNdwiLayer = L.tileLayer.wms('/api/v1/copernicus/wms', {
            layers: 'NDWI',
            format: 'image/png',
            transparent: true,
            opacity: 0.6,
            attribution: '&copy; Copernicus Sentinel Data',
            maxcc: 20,
            time: timeString
        });

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function getRiverStyle(feature) {
            const type = feature.properties.status;
            let color = '#3b82f6';
            let weight = 2.5;
            let opacity = 0.8;
            if (type === 'critical') { color = '#ef4444'; weight = 3.5; opacity = 1.0; }
            else if (type === 'warning') { color = '#f59e0b'; weight = 2.5; opacity = 0.9; }
            return { color: color, weight: weight, opacity: opacity, lineCap: 'round', lineJoin: 'round', smoothFactor: 0.5 };
        }

        function onEachRiver(feature, layer) {
            if (feature.properties && (feature.properties.name || feature.properties.segment_id)) {
                const props = feature.properties;
                const riverName = props.name || "Major Waterway";
                let titleColor = '#3b82f6';
                if (props.status === 'critical') titleColor = '#ef4444';
                if (props.status === 'warning') titleColor = '#f59e0b';

                const tooltipContent = `
                    <div class="custom-tooltip">
                        <div class="title" style="color: ${titleColor}">${riverName}</div>
                        <div class="metric"><strong>Risk Score:</strong> ${props.risk_score !== null ? (props.risk_score * 100).toFixed(0) + '%' : 'N/A'}</div>
                        ${props.hydration_index !== null ? `
                        <div class="metric" style="color: #4db8ff"><strong>Sentinel NDWI:</strong> ${props.hydration_index.toFixed(3)}</div>
                        <div class="metric" style="color: #4db8ff"><strong>Sentinel Turbidity:</strong> ${props.turbidity.toFixed(1)}</div>
                        ` : '<div class="metric" style="color: #666"><em>Awaiting satellite pass...</em></div>'}
                        <div class="reason"><strong>Assessment:</strong><br/>${props.explanation}</div>
                        ${props.source_url ? `
                        <div class="reason" style="margin-top: 8px; border-top: 1px solid #333; padding-top: 4px;">
                            <a href="${props.source_url}" target="_blank" style="color: #4db8ff; text-decoration: none; font-size: 0.75rem;">View Alert Source →</a>
                        </div>` : ''}
                    </div>
                `;
                layer.bindTooltip(tooltipContent, { sticky: false, interactive: true, className: 'leaflet-tooltip-custom', direction: 'top', opacity: 1 });
                layer.bindPopup(tooltipContent, { className: 'leaflet-tooltip-custom' });
                layer.on({
                    mouseover: function(e) { e.target.setStyle({ opacity: 1.0, weight: 5 }); },
                    mouseout: function(e) { geojsonLayer.resetStyle(e.target); if (highResLayer) highResLayer.resetStyle(e.target); }
                });
            }
        }

        let highResLayer = null;
        async function updateHighResData() {
            const zoom = map.getZoom();
            const sentinelOnly = document.getElementById('sentinel-debug').checked;
            
            if (zoom < 12) {
                if (highResLayer) map.removeLayer(highResLayer);
                if (window.geojsonLayer && !map.hasLayer(window.geojsonLayer)) window.geojsonLayer.addTo(map);
                return;
            }
            
            const bounds = map.getBounds();
            const url = `/api/v1/waterways/viewport?min_lat=${bounds.getSouth()}&max_lat=${bounds.getNorth()}&min_lng=${bounds.getWest()}&max_lng=${bounds.getEast()}&zoom=${zoom}&sentinel_only=${sentinelOnly}`;
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader').innerText = "Fetching live telemetry...";
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (highResLayer) map.removeLayer(highResLayer);
                
                // Only use highRes if we actually got features
                if (data.features && data.features.length > 0) {
                    if (window.geojsonLayer) map.removeLayer(window.geojsonLayer);
                    highResLayer = L.geoJSON(data, { style: getRiverStyle, onEachFeature: onEachRiver }).addTo(map);
                    document.getElementById('loader').innerText = `Active: ${data.features.length} segments.`;
                } else {
                    // If empty and NOT sentinelOnly, show fallback
                    if (!sentinelOnly) {
                        if (window.geojsonLayer && !map.hasLayer(window.geojsonLayer)) window.geojsonLayer.addTo(map);
                        document.getElementById('loader').innerText = "No high-res data here. Showing baseline.";
                    } else {
                        if (window.geojsonLayer) map.removeLayer(window.geojsonLayer);
                        document.getElementById('loader').innerText = "No Sentinel segments in this area.";
                    }
                }
            } catch (e) { 
                console.error("Failed to fetch high-res segments:", e); 
                document.getElementById('loader').innerText = "API Error. Check console.";
            }
        }
        map.on('moveend', updateHighResData);

        fetch('segmented_uk_rivers.geojson')
            .then(response => response.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                window.geojsonLayer = L.geoJSON(data, { style: getRiverStyle, onEachFeature: onEachRiver }).addTo(map);
            })
            .catch(error => { document.getElementById('loader').innerText = "Failed to load mapping data."; });

        window.updateNdwiOpacity = function(value) {
            copernicusNdwiLayer.setOpacity(value / 100);
        };

        window.changeBasemap = function(type) {
            const ndwiLegend = document.getElementById('ndwi-legend');
            const ndwiTimestamp = document.getElementById('ndwi-timestamp');
            if (map.hasLayer(satelliteMap)) map.removeLayer(satelliteMap);
            if (map.hasLayer(darkMap)) map.removeLayer(darkMap);
            if (map.hasLayer(copernicusNdwiLayer)) map.removeLayer(copernicusNdwiLayer);

            if (type === 'satellite') {
                satelliteMap.addTo(map);
                if (ndwiLegend) ndwiLegend.style.display = 'none';
            } else if (type === 'dark') {
                darkMap.addTo(map);
                if (ndwiLegend) ndwiLegend.style.display = 'none';
            } else if (type === 'ndwi') {
                satelliteMap.addTo(map);
                copernicusNdwiLayer.addTo(map);
                if (ndwiLegend) ndwiLegend.style.display = 'block';
                const date = new Date();
                date.setDate(date.getDate() - 2);
                const dateStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                if (ndwiTimestamp) ndwiTimestamp.innerText = `Latest Scan: ${dateStr} (Sentinel-2)`;
            }
            if (window.geojsonLayer) window.geojsonLayer.bringToFront();
            if (highResLayer) highResLayer.bringToFront();
        };

        document.head.insertAdjacentHTML('beforeend', '<style>.leaflet-tooltip-custom { background: transparent; border: none; box-shadow: none; }</style>');
    </script>
</body>
</html>
